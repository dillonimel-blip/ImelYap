<script>
const text = "Accessing system... Welcome to the SAPIEN hub. Here you will find a compilation of related works as well as well as links to socials.";
const speed = 50;
let i = 0;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("typed-text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
    }
}

window.onload = typeWriter;
</script>
